<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meta Campaign Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0e18;--s1:#111520;--s2:#161b2e;--s3:#1d2440;--s4:#242d50;--bdr:#2c3558;--bdr2:#3d4a75;--text:#d8dff5;--muted:#6e7da6;--dim:#3f4d78;--blue:#3b6ef5;--blue-d:#2a55d4;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{max-width:940px;margin:0 auto;padding:24px 16px 100px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding:20px 24px;background:var(--s2);border:1px solid var(--bdr);border-radius:14px}
.logo{width:44px;height:44px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0}
.header-text h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.header-text p{font-size:12px;color:var(--muted)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.conn-badge{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;cursor:pointer;transition:all .15s}
.conn-badge.idle{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--amber)}
.conn-badge.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--green)}
.conn-badge.err{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);animation:pulse 2s infinite}
.dot-amber{background:var(--amber)}
.dot-red{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--s2);border:1px solid var(--bdr);border-radius:16px;padding:28px;width:500px;max-width:94vw}
.modal h2{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.conn-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.conn-opt{padding:18px;border:1.5px solid var(--bdr);border-radius:10px;cursor:pointer;background:var(--s3);transition:all .2s;text-align:center}
.conn-opt:hover,.conn-opt.sel{border-color:var(--blue);background:rgba(59,110,245,.1)}
.conn-opt .ico{font-size:28px;margin-bottom:8px}
.conn-opt h3{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.conn-opt p{font-size:11px;color:var(--muted);margin:0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.hidden{display:none!important}
.steps{display:flex;margin-bottom:24px;background:var(--s2);border-radius:12px;padding:5px;border:1px solid var(--bdr);gap:2px}
.sbtn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-size:11px;font-weight:600;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px}
.snum{width:22px;height:22px;border-radius:50%;background:var(--s4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s}
.sbtn.active{background:var(--s3);color:#fff}.sbtn.active .snum{background:var(--blue);color:#fff}
.sbtn.done{color:var(--green)}.sbtn.done .snum{background:var(--green);color:#fff}
.card{background:var(--s2);border:1px solid var(--bdr);border-radius:14px;padding:22px;margin-bottom:12px}
.card-hd{font-size:14px;font-weight:700;margin-bottom:18px;color:#fff;display:flex;align-items:center;gap:10px}
.card-ico{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.field{margin-bottom:14px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{width:100%;background:var(--s3);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--s4)}
select option{background:#161b2e}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.input-pfx{display:flex;align-items:stretch}
.input-pfx .pfx{padding:0 11px;background:var(--s4);border:1px solid var(--bdr);border-radius:8px 0 0 8px;font-size:12px;color:var(--muted);display:flex;align-items:center;white-space:nowrap;border-right:none}
.input-pfx input{border-radius:0 8px 8px 0}
.char-hint{font-size:11px;color:var(--dim);margin-top:3px}
.trow{display:flex;gap:6px;flex-wrap:wrap}
.tbtn{padding:7px 14px;border:1px solid var(--bdr);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.tbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.tbtn:hover:not(.on){border-color:var(--bdr2);color:var(--text)}
.swr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--s3);border-radius:8px;border:1px solid var(--bdr);margin-bottom:9px}
.sw{width:38px;height:21px;background:var(--s4);border-radius:11px;cursor:pointer;position:relative;transition:background .15s;border:1px solid var(--bdr);flex-shrink:0}
.sw.on{background:var(--blue);border-color:var(--blue)}
.sw::after{content:'';position:absolute;top:2px;right:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:transform .15s}
.sw.on::after{transform:translateX(-17px)}
.tag-wrap{background:var(--s3);border:1px solid var(--bdr);border-radius:8px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;min-height:38px;cursor:text;transition:border .15s}
.tag-wrap:focus-within{border-color:var(--blue)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.tag-b{background:rgba(59,110,245,.15);color:#7ab4f5}.tag-r{background:rgba(239,68,68,.1);color:#fca5a5}
.tag input{border:none!important;background:transparent!important;outline:none;color:var(--text);font-size:12px;min-width:80px;padding:2px;width:auto}
.tag-x{cursor:pointer;opacity:.5;font-size:10px}.tag-x:hover{opacity:1}
.acc{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;overflow:hidden}
.acc-hd{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:13px;color:#fff;background:var(--s3);user-select:none}
.acc-hd:hover{background:var(--s4)}
.acc-body{padding:18px;display:none;border-top:1px solid var(--bdr)}.acc-body.open{display:block}
.paused-pill{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,.12);color:var(--amber);font-weight:700;margin-right:8px}
.info{background:rgba(59,110,245,.07);border:1px solid rgba(59,110,245,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#7ab4f5;margin-bottom:12px;line-height:1.6}
.warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#fcd34d;margin-bottom:12px}
.note{font-size:11px;color:var(--dim);margin-top:3px;font-style:italic}
.btn{padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover:not(:disabled){background:var(--blue-d)}
.btn-ghost{background:var(--s4);color:var(--text);border:1px solid var(--bdr)}.btn-ghost:hover{background:var(--s3)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover:not(:disabled){background:#16a34a}
.btn-sm{padding:6px 13px;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px}
.counter-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cnt-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:var(--s4);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s}
.cnt-btn:hover{background:var(--blue);border-color:var(--blue)}
.cnt-val{font-size:17px;font-weight:700;color:#fff;min-width:28px;text-align:center}
hr.dv{border:none;border-top:1px solid var(--bdr);margin:16px 0}
.sec-ttl{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-c{background:var(--s3);border:1px solid var(--bdr);border-radius:9px;padding:13px;text-align:center}
.stat-l{font-size:11px;color:var(--muted);margin-bottom:4px}.stat-v{font-size:14px;font-weight:700;color:#fff}
.tree-wrap{background:var(--s3);border:1px solid var(--bdr);border-radius:9px;padding:15px;margin-bottom:12px}
.tree-camp{font-weight:700;color:#fff;font-size:13px;margin-bottom:10px}
.tree-adset{padding:6px 0 6px 16px;border-left:2px solid var(--blue);margin-bottom:6px}
.tree-adset-name{font-size:12px;color:#7ab4f5;font-weight:600;margin-bottom:4px}
.tree-ad{font-size:11px;color:var(--muted);padding:2px 12px}
.brief-box{background:var(--s3);border:1px solid var(--bdr);border-radius:8px;padding:14px;font-size:11.5px;color:var(--text);font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;margin-bottom:12px;line-height:1.7}
.utm-preview{background:var(--s4);border:1px solid var(--bdr);border-radius:6px;padding:8px 11px;font-size:11px;color:#7ab4f5;word-break:break-all;font-family:monospace;margin-top:6px;line-height:1.5}
.loading-cell{display:flex;align-items:center;gap:9px;padding:10px;color:var(--muted);font-size:12px}
.spinner-sm{width:15px;height:15px;border:2px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.conn-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s3);border:1px solid var(--bdr);border-radius:10px;margin-bottom:14px}
.conn-bar-left{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600}
.output-panel{background:linear-gradient(135deg,rgba(59,110,245,.05),rgba(167,139,250,.05));border:1px solid rgba(167,139,250,.25);border-radius:12px;padding:18px;margin-top:12px}
.output-hd{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13px;color:#c4b5fd;margin-bottom:12px}
.output-body{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.thinking::after{content:'...';animation:dots 1.2s infinite}
.cb-row{display:flex;flex-wrap:wrap;gap:7px}
.cb-item{display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 11px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;color:var(--muted);transition:all .15s;background:var(--s3)}
.cb-item input{width:14px;height:14px;accent-color:var(--blue)}
.cb-item:has(input:checked){border-color:var(--blue);color:var(--text);background:rgba(59,110,245,.08)}
</style>
</head>
<body>
<div class="app">
